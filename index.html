<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Notas</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="icon"
      type="image/png"
      href="/img/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
    <link rel="shortcut icon" href="/img/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/img/apple-touch-icon.png"
    />
    <link rel="manifest" href="/img/site.webmanifest" />
  </head>
  <body>
    <div class="theme-toggle" onclick="toggleTheme()">
      <span id="theme-icon">🌙</span>
    </div>
    <div class="container">
      <h2>Calculadora de Notas</h2>
      <p>Insira suas notas:</p>
      <div>
        <label>AO1:</label>
        <input type="number" id="nota1" min="0" max="1" step="0.1" />
        <input type="number" id="nota2" min="0" max="1" step="0.1" />
        <input type="number" id="nota3" min="0" max="1" step="0.1" />
        <input type="number" id="nota4" min="0" max="1" step="0.1" />
      </div>
      <div>
        <label>AO2:</label>
        <input type="number" id="nota5" min="0" max="6" step="0.1" />
      </div>
      <button onclick="calcularNota()">Calcular</button>
      <p id="resultado"></p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
